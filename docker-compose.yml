services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: inventoryos
      POSTGRES_USER: inventoryos_user
      POSTGRES_PASSWORD: inventoryos_password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
